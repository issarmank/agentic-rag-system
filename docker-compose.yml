services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - APP_SHARED_SECRET=${APP_SHARED_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: ./backend
    command: arq worker.WorkerSettings
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - APP_SHARED_SECRET=${APP_SHARED_SECRET}
    depends_on:
      - backend
    restart: unless-stopped
